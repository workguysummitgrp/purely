name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-review:
    name: PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Opt-in: set vars.ENABLE_AI_PR_REVIEW to 'true' in repository variables
    if: vars.ENABLE_AI_PR_REVIEW == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Extract PR info
        id: pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DELIM=$(openssl rand -hex 16)

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"

          echo "title<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$PR_BODY" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > pr_diff.txt

          head -c 15000 pr_diff.txt > pr_diff_small.txt

      - name: Generate AI code review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. AI review skipped." > ai_review.md
            exit 0
          fi

          MODEL="${AI_MODEL:-gpt-4.1-mini}"
          DIFF=$(cat pr_diff_small.txt)

          JSON=$(jq -n \
            --arg diff "$DIFF" \
            --arg model "$MODEL" \
            '{
              model:$model,
              messages:[
                {role:"user",content:("You are a senior software engineer performing a pull request code review.\n\nAnalyze the following git diff and identify potential problems.\n\nRules:\n- Only use information present in the diff.\n- Do NOT repeat the changes already explained in the PR Summary.\n- Focus on code quality, correctness, bugs, maintainability, performance and security.\n- Keep responses concise.\n- Categorize findings clearly.\n\nReturn ONLY these sections with Markdown headings:\n\n### Issues Found\nList real problems or risks.\n\n### Suggestions\nProvide improvements or refactoring suggestions.\n\n### Risk Level\nLow / Medium / High with a short explanation.\n\nGit Diff:\n" + $diff)}
              ]
            }')

          RESPONSE=$(curl -s --max-time 60 --retry 2 --retry-delay 5 \
            https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$JSON")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ "$REVIEW" = "null" ] || [ -z "$REVIEW" ]; then
            REVIEW="AI review could not be generated."
          fi

          REVIEW=$(echo "$REVIEW" | sed 's/^```//' | sed 's/```$//')
          echo "$REVIEW" > ai_review.md

      - name: Prepare PR comment
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          {
            echo "## Code Review"
            echo ""
            echo "PR: #$PR_NUMBER"
            echo "Branch: $PR_BRANCH"
            echo ""
            echo "---"
            echo ""
            cat ai_review.md
            echo ""
            echo "---"
          } > comment.md

      - name: Post comment to PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fs = require('fs')

            const body = fs.readFileSync('comment.md', 'utf8')
            const issue_number = Number(process.env.PR_NUMBER)

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            })

            const existing = comments.data.find((c) =>
              c.body.includes("## Code Review")
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }

      - name: Finish
        run: echo "PR review completed"
