name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: false
      jira_ticket:
        description: "Jira Ticket ID (for example: PROJ-123)"
        required: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-summary-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Opt-in: set vars.ENABLE_AI_PR_SUMMARY to 'true' in repository variables
    if: vars.ENABLE_AI_PR_SUMMARY == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Extract PR info
        id: pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER_EVENT: ${{ github.event.pull_request.number }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          DELIM=$(openssl rand -hex 16)

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$PR_NUMBER_INPUT"

            if [ -z "$PR_NUMBER" ]; then
              echo "PR number required for manual run"
              exit 1
            fi

            PR_DATA=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER")

            TITLE=$(echo "$PR_DATA" | jq -r '.title')
            BODY=$(echo "$PR_DATA" | jq -r '.body')
            BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          else
            PR_NUMBER="$PR_NUMBER_EVENT"
            TITLE="$PR_TITLE"
            BODY="$PR_BODY"
            BRANCH="$PR_BRANCH"
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          echo "title<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Detect Jira ticket
        id: jira
        env:
          PR_TITLE_TEXT: ${{ steps.pr.outputs.title }}
          PR_BODY_TEXT: ${{ steps.pr.outputs.body }}
          INPUT_JIRA: ${{ inputs.jira_ticket }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            JIRA="$INPUT_JIRA"
          else
            TEXT="$PR_TITLE_TEXT $PR_BODY_TEXT"
            JIRA=$(echo "$TEXT" | grep -oE '[A-Z]+-[0-9]+' | head -n1 || true)
          fi

          echo "jira=$JIRA" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > pr_diff.txt

          head -c 12000 pr_diff.txt > pr_diff_small.txt

      - name: Generate AI summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          PR_TITLE_TEXT: ${{ steps.pr.outputs.title }}
          PR_BODY_TEXT: ${{ steps.pr.outputs.body }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. AI summary skipped." > ai_summary.md
            exit 0
          fi

          MODEL="${AI_MODEL:-gpt-4.1-mini}"
          DIFF=$(cat pr_diff_small.txt)

          JSON=$(jq -n \
            --arg diff "$DIFF" \
            --arg title "$PR_TITLE_TEXT" \
            --arg body "$PR_BODY_TEXT" \
            --arg model "$MODEL" \
            '{
              model:$model,
              messages:[
                {role:"user",content:("You are summarizing a GitHub pull request.\n\nYour job is to produce a high-level summary for reviewers.\n\nRules:\n- Do NOT perform code review.\n- Do NOT mention bugs, issues, or suggestions.\n- Focus only on WHAT changed and WHY.\n- Keep output concise (2-3 lines per section).\n\nReturn ONLY these sections using Markdown headings:\n\n### Overview\nBriefly explain the purpose of the PR.\n\n### Key Changes\nList the main functional changes.\n\n### Impact Area\nDescribe which part of the system is affected.\n\n### Risk Level\nLow / Medium / High with a short reason.\n\nPull Request Title:\n" + $title + "\n\nPull Request Description:\n" + $body + "\n\nGit Diff:\n" + $diff)}
              ]
            }')

          RESPONSE=$(curl -s --max-time 60 --retry 2 --retry-delay 5 \
            https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$JSON")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ "$SUMMARY" = "null" ] || [ -z "$SUMMARY" ]; then
            SUMMARY="AI summary could not be generated."
          fi

          SUMMARY=$(echo "$SUMMARY" | sed 's/^```//' | sed 's/```$//')
          echo "$SUMMARY" > ai_summary.md

      - name: Prepare comment
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
          JIRA_TICKET: ${{ steps.jira.outputs.jira }}
        run: |
          {
            echo "## PR Summary"
            echo ""
            echo "PR: #$PR_NUMBER"
            echo "Branch: $PR_BRANCH"
            echo "Jira: $JIRA_TICKET"
            echo ""
            echo "---"
            echo ""
            cat ai_summary.md
            echo ""
            echo "---"
          } > comment.md

      - name: Post comment to PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fs = require('fs')

            const body = fs.readFileSync('comment.md', 'utf8')
            const issue_number = Number(process.env.PR_NUMBER)

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            })

            const existing = comments.data.find((c) =>
              c.body.includes("## PR Summary")
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }

      - name: Check Jira credentials
        id: jira_creds
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          if [ -n "$JIRA_EMAIL" ] && [ -n "$JIRA_API_TOKEN" ] && [ -n "$JIRA_BASE_URL" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post comment to Jira
        if: steps.jira.outputs.jira != '' && steps.jira_creds.outputs.has_creds == 'true'
        env:
          JIRA_USER: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_TICKET: ${{ steps.jira.outputs.jira }}
        run: |
          TEXT=$(head -c 5000 comment.md)

          JSON=$(jq -n \
            --arg text "$TEXT" \
            '{
              body:{
                type:"doc",
                version:1,
                content:[
                  {
                    type:"paragraph",
                    content:[
                      {type:"text",text:$text}
                    ]
                  }
                ]
              }
            }')

          curl -s -X POST \
            -u "$JIRA_USER:$JIRA_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$JSON" \
            "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET/comment"

      - name: Finish
        run: echo "PR summary completed"
