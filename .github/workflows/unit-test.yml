name: Unit Test Execution

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect test target
        id: detect
        run: |
          # Auto-detect test directory — checks common conventions
          if [ -d "tests" ]; then
            echo "test_target=tests" >> "$GITHUB_OUTPUT"
            echo "editable_pkg=." >> "$GITHUB_OUTPUT"
          elif [ -d "test" ]; then
            echo "test_target=test" >> "$GITHUB_OUTPUT"
            echo "editable_pkg=." >> "$GITHUB_OUTPUT"
          else
            # Search for any top-level directory containing a tests/ subfolder
            TARGET=$(find . -maxdepth 2 -type d -name tests | head -n1 | sed 's|^\./||')
            if [ -n "$TARGET" ]; then
              PKG=$(dirname "$TARGET")
              echo "test_target=$TARGET" >> "$GITHUB_OUTPUT"
              echo "editable_pkg=$PKG" >> "$GITHUB_OUTPUT"
            else
              echo "test_target=" >> "$GITHUB_OUTPUT"
              echo "editable_pkg=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Python
        if: steps.detect.outputs.test_target != ''
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.detect.outputs.test_target != ''
        env:
          EDITABLE_PKG: ${{ steps.detect.outputs.editable_pkg }}
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx respx
          pip install -e "./$EDITABLE_PKG"

      - name: Run tests
        if: steps.detect.outputs.test_target != ''
        env:
          TEST_TARGET: ${{ steps.detect.outputs.test_target }}
        run: |
          pytest "$TEST_TARGET" --cov --cov-report=xml

      - name: Skip summary
        if: steps.detect.outputs.test_target == ''
        run: |
          echo "No test directory found. Skipping test run."
