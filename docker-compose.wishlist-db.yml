# ---------------------------------------------------------------------------
# Docker Compose — Standalone MongoDB for Wishlist Service Local Development
#
# Provides an isolated MongoDB instance for the wishlist-service so developers
# can run and test the service independently without standing up the entire
# platform's shared MongoDB.
#
# Usage:
#   docker compose -f docker-compose.wishlist-db.yml up -d
#
# Seed data after startup:
#   docker compose -f docker-compose.wishlist-db.yml exec wishlist-mongo \
#     mongosh purely_wishlist_service /seed/seed-mongo-wishlist.js
#
# Index initialization:
#   docker compose -f docker-compose.wishlist-db.yml exec wishlist-mongo \
#     mongosh purely_wishlist_service /docker-entrypoint-initdb.d/init-indexes.js
#
# Connection string (matches application.yml):
#   mongodb://127.0.0.1:27017/purely_wishlist_service
# ---------------------------------------------------------------------------

services:
  wishlist-mongo:
    image: mongo:7
    container_name: purely-wishlist-mongo
    ports:
      - "27017:27017"
    volumes:
      # Persist data across container restarts
      - wishlist-mongo-data:/data/db
      # Mount index init script — auto-runs on first container start
      - ./microservice-backend/wishlist-service/src/main/resources/mongo-init/init-indexes.js:/docker-entrypoint-initdb.d/init-indexes.js:ro
      # Mount seed script for manual seeding
      - ./seed-mongo-wishlist.js:/seed/seed-mongo-wishlist.js:ro
    environment:
      # No auth for local dev — do NOT use in production
      MONGO_INITDB_DATABASE: purely_wishlist_service
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  wishlist-mongo-data:
    driver: local
