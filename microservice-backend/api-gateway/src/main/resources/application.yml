# Modified by SDLC Agent | 2026-04-08 | purely-wishlist-service-PURELY-23 | development
# Change: Added wishlist-service route (/api/wishlist/** -> WISHLIST-SERVICE)
# CR-004 fix: Added wishlist-service-public route for /api/wishlist/shared/** (no JWT).
# Placed before the general wishlist-service route for first-match routing.
server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth-service/**
          filters:
            - StripPrefix=2

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notification-service/**
          filters:
            - StripPrefix=2

        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/category-service/**
          filters:
            - StripPrefix=2

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/product-service/**
          filters:
            - StripPrefix=2

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/user-service/**
          filters:
            - StripPrefix=2

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/cart-service/**
          filters:
            - StripPrefix=2

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/order-service/**
          filters:
            - StripPrefix=2

        # --- PUBLIC: Shared Wishlist Route (no JWT) ---
        # Must appear BEFORE the general wishlist-service route (first-match).
        # GET /api/wishlist/shared/{shareToken} is publicly accessible.
        - id: wishlist-service-public
          uri: lb://WISHLIST-SERVICE
          predicates:
            - Path=/api/wishlist/shared/**
          filters:
            - StripPrefix=1

        # --- Wishlist Service Route (US-009) ---
        # Routes /api/wishlist/** to WISHLIST-SERVICE via Eureka.
        # StripPrefix=1 removes /api, forwarding /wishlist/** to the service.
        # AuthorizationHeaderFilter enforces JWT on all non-public paths.
        - id: wishlist-service
          uri: lb://WISHLIST-SERVICE
          predicates:
            - Path=/api/wishlist/**
          filters:
            - StripPrefix=1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: '*'
            allowedMethods: '*'
            allowedHeaders: '*'


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetchRegistry: true
    registerWithEureka: true
  instance:
    hostname: localhost
