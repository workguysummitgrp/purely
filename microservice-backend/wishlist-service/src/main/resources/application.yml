# Generated by SDLC Agent | 2026-04-08 | purely-wishlist-service-PURELY-23 | development
spring:
    application:
        name: wishlist-service
    data:
        mongodb:
            uri: mongodb://127.0.0.1:27017/purely_wishlist_service

server:
    port: 8088

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/
    instance:
        hostname: localhost

# Resilience4j Circuit Breaker Configuration (new to project)
resilience4j:
    circuitbreaker:
        instances:
            productService:
                registerHealthIndicator: true
                slidingWindowSize: 10
                failureRateThreshold: 50
                waitDurationInOpenState: 10s
                permittedNumberOfCallsInHalfOpenState: 3
                slidingWindowType: COUNT_BASED
                minimumNumberOfCalls: 5
            cartService:
                registerHealthIndicator: true
                slidingWindowSize: 10
                failureRateThreshold: 50
                waitDurationInOpenState: 10s
                permittedNumberOfCallsInHalfOpenState: 3
                slidingWindowType: COUNT_BASED
                minimumNumberOfCalls: 5

# Actuator endpoints for health checks and circuit breaker monitoring
management:
    endpoints:
        web:
            exposure:
                include: health,info,circuitbreakers
    health:
        circuitbreakers:
            enabled: true
